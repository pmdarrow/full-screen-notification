name: FullScreenNotification
include:
  - path: project.local.yml
    required: false
options:
  bundleIdPrefix: com.fullscreennotification
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  AppAuth:
    url: https://github.com/openid/AppAuth-iOS
    from: 2.0.0

targets:
  FullScreenNotification:
    type: application
    platform: macOS
    sources:
      - path: FullScreenNotification
        excludes:
          - "**/*.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fullscreennotification.app
        INFOPLIST_FILE: FullScreenNotification/Info.plist
        CODE_SIGN_ENTITLEMENTS: FullScreenNotification/FullScreenNotification.entitlements
        CODE_SIGN_STYLE: Automatic
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        PRODUCT_NAME: Full Screen Notification
        PRODUCT_MODULE_NAME: FullScreenNotification
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: 5
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: AppAuth
